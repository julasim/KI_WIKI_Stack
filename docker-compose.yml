# KI-OS Stack — orchestriert Bot + Dashboard + MCP als ein Docker-Compose-Projekt.
# Erwartet Layout:
#   /opt/bot/         (geklontes julasim/KI_WIKI_OS)
#   /opt/dashboard/   (geklontes julasim/KI_WIKI_Dashboard)
#   /opt/mcp/         (geklontes julasim/KI_WIKI_MCP)
#   /opt/ki-os/       (dieses Repo — orchestriert die anderen)
#
# Alle Services sind im UI als ein Projekt sichtbar (ki-os).
# Bot + MCP schreiben in Vault, Dashboard liest read-only.

name: ki-os

services:
  bot:
    build: ../bot
    container_name: ki-os-bot
    restart: unless-stopped
    env_file:
      - ../bot/.env
    environment:
      - VAULT_PATH=/vault
    volumes:
      # Vault read-write für Bot
      - /opt/vault/KI_WIKI_Vault:/vault
      # Whisper-Modell-Cache (überlebt Container-Rebuilds)
      - whisper-cache:/root/.cache/huggingface
      # Lokaler Clone des GitHub-Backup-Repos (überlebt Restarts)
      - vault-backup:/vault-backup
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  dashboard:
    build: ../dashboard
    container_name: ki-os-dashboard
    restart: unless-stopped
    # Container-INTERN auf 5000 (Next.js liest PORT env), Host exposed 5001.
    ports:
      - "5001:5000"
    volumes:
      # Vault READ-ONLY — Dashboard schreibt nichts
      - /opt/vault/KI_WIKI_Vault:/vault:ro
    environment:
      - VAULT_PATH=/vault
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - PORT=5000
      - HOSTNAME=0.0.0.0
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mcp:
    build: ../mcp
    container_name: ki-os-mcp
    restart: unless-stopped
    # Kein externer Port mehr — Caddy reverse-proxied von außen.
    # (5002 ist nur intern im docker-Netzwerk erreichbar.)
    expose:
      - "5002"
    env_file:
      - ../mcp/.env
    environment:
      - VAULT_PATH=/vault
      - MCP_HOST=0.0.0.0
      - MCP_PORT=5002
    volumes:
      # Vault READ-WRITE — MCP-Server kann Notes/Tasks anlegen
      - /opt/vault/KI_WIKI_Vault:/vault
      # Audit-Log persistent (JSONL aller Tool-Calls)
      - /opt/mcp-logs:/var/log/mcp
      # Snapshots vor destruktiven Ops (tar.gz)
      - /opt/mcp-snapshots:/snapshots
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5002/health',timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    container_name: ki-os-caddy
    restart: unless-stopped
    # Caddy lauscht INTERN auf 5080/5443 (5xxx-Konvention für unser Projekt).
    # Docker mapped Standard-Web-Ports der Außenwelt auf diese internen Ports —
    # so funktioniert Let's Encrypt HTTP-01-Challenge weiterhin und URLs bleiben sauber.
    ports:
      - "80:5080"        # World HTTP-80 → Caddy intern 5080 (ACME-Challenge)
      - "443:5443"       # World HTTPS-443 → Caddy intern 5443
      - "443:5443/udp"   # HTTP/3 (QUIC)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data       # TLS-Zertifikate (PERSISTENT — sonst Re-Issue jedes Mal)
      - caddy-config:/config
    depends_on:
      - mcp
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  whisper-cache:
  vault-backup:
  caddy-data:
  caddy-config:
