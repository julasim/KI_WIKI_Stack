# KI-OS Stack — orchestriert Bot + Dashboard + MCP als ein Docker-Compose-Projekt.
#
# Erwartet Layout:
#   /opt/bot/         (geklontes julasim/KI_WIKI_OS)
#   /opt/dashboard/   (geklontes julasim/KI_WIKI_Dashboard)
#   /opt/mcp/         (geklontes julasim/KI_WIKI_MCP)
#   /opt/ki-os/       (dieses Repo — orchestriert die anderen)
#
# TLS/Reverse-Proxy läuft NICHT mehr in diesem Stack — siehe /opt/proxy/
# (julasim/Proxy). Container die externe URLs brauchen joinen das
# externe `proxy`-Netzwerk und werden dort als reverse_proxy registriert.

name: ki-os

services:
  bot:
    build: ../bot
    container_name: ki-os-bot
    restart: unless-stopped
    env_file:
      - ../bot/.env
    environment:
      - VAULT_PATH=/vault
    volumes:
      - /opt/vault/KI_WIKI_Vault:/vault
      - whisper-cache:/root/.cache/huggingface
      - vault-backup:/vault-backup
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  dashboard:
    build: ../dashboard
    container_name: ki-os-dashboard
    restart: unless-stopped
    # Dashboard läuft jetzt mit Auth.js Login + TLS via Edge-Proxy.
    # Direct-Port 5001 bleibt parallel für Lokalzugriff/Debugging.
    ports:
      - "5001:5000"
    env_file:
      - ../dashboard/.env
    volumes:
      - /opt/vault/KI_WIKI_Vault:/vault:ro
    environment:
      - VAULT_PATH=/vault
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - PORT=5000
      - HOSTNAME=0.0.0.0
    networks:
      - proxy        # Edge-Caddy kann reverse-proxien
      - default      # interne Container-Kommunikation
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mcp:
    build: ../mcp
    container_name: ki-os-mcp
    restart: unless-stopped
    # Kein externer Port — externe Verbindungen ausschließlich via Edge-Caddy
    # (im /opt/proxy/-Stack) das im `proxy`-Netzwerk auf uns zugreift.
    expose:
      - "5002"
    env_file:
      - ../mcp/.env
    environment:
      - VAULT_PATH=/vault
      - MCP_HOST=0.0.0.0
      - MCP_PORT=5002
    volumes:
      - /opt/vault/KI_WIKI_Vault:/vault
      - /opt/mcp-logs:/var/log/mcp
      - /opt/mcp-snapshots:/snapshots
    networks:
      - proxy        # für Edge-Caddy erreichbar
      - default      # interne Container-Kommunikation
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5002/health',timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  proxy:
    external: true   # vom Edge-Proxy-Stack verwaltet (siehe /opt/proxy/)

volumes:
  whisper-cache:
  vault-backup:
